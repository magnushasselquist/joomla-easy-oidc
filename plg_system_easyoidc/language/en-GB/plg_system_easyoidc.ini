PLG_SYSTEM_EASYOIDC="System - Easy OIDC"
PLG_SYSTEM_EASYOIDC_XML_DESCRIPTION="Minimal OIDC SSO for Joomla. Authenticates users against an external identity provider (Keycloak-tested) via the OpenID Connect authorization-code flow with PKCE."

PLG_SYSTEM_EASYOIDC_FIELDSET_BASIC="Basic"
PLG_SYSTEM_EASYOIDC_FIELDSET_ADVANCED="Advanced"

PLG_SYSTEM_EASYOIDC_FIELD_ISSUER_URL="Issuer URL"
PLG_SYSTEM_EASYOIDC_FIELD_ISSUER_URL_DESC="The OIDC provider's issuer URL. For Keycloak this is https://<host>/realms/<realm>. The plugin discovers all other endpoints from .well-known/openid-configuration."

PLG_SYSTEM_EASYOIDC_FIELD_CLIENT_ID="Client ID"
PLG_SYSTEM_EASYOIDC_FIELD_CLIENT_ID_DESC="The OAuth/OIDC client identifier configured at the IdP."

PLG_SYSTEM_EASYOIDC_FIELD_CLIENT_SECRET="Client Secret"
PLG_SYSTEM_EASYOIDC_FIELD_CLIENT_SECRET_DESC="The client secret for confidential clients. Leave empty for public clients (PKCE only)."

PLG_SYSTEM_EASYOIDC_FIELD_SCOPES="Scopes"
PLG_SYSTEM_EASYOIDC_FIELD_SCOPES_DESC="Space-separated OIDC scopes to request. Default is 'openid profile email'."

PLG_SYSTEM_EASYOIDC_FIELD_MATCH_FIELD="Match Joomla user by"
PLG_SYSTEM_EASYOIDC_FIELD_MATCH_FIELD_DESC="Which field identifies the Joomla user: username (matched against the preferred_username claim) or email (matched against the email claim)."
PLG_SYSTEM_EASYOIDC_OPT_MATCH_USERNAME="Username (preferred_username)"
PLG_SYSTEM_EASYOIDC_OPT_MATCH_EMAIL="Email"

PLG_SYSTEM_EASYOIDC_FIELD_PROVISIONING="Provisioning"
PLG_SYSTEM_EASYOIDC_FIELD_PROVISIONING_DESC="What to do when an authenticated IdP user has no matching Joomla user: reject (match-only) or create a new Joomla user (auto-create)."
PLG_SYSTEM_EASYOIDC_OPT_PROV_MATCH_ONLY="Match only (reject unknown users)"
PLG_SYSTEM_EASYOIDC_OPT_PROV_AUTO_CREATE="Auto-create new users"

PLG_SYSTEM_EASYOIDC_FIELD_DEFAULT_GROUP="Default user group"
PLG_SYSTEM_EASYOIDC_FIELD_DEFAULT_GROUP_DESC="Joomla user group assigned to auto-created users."

PLG_SYSTEM_EASYOIDC_FIELD_SINGLE_LOGOUT="Single Logout (RP-initiated)"
PLG_SYSTEM_EASYOIDC_FIELD_SINGLE_LOGOUT_DESC="When enabled, logging out of Joomla also signs the user out of the IdP via the end_session endpoint."

PLG_SYSTEM_EASYOIDC_FIELD_CLAIM_USERNAME="Username claim"
PLG_SYSTEM_EASYOIDC_FIELD_CLAIM_USERNAME_DESC="The OIDC claim that holds the user's login name. Standard is preferred_username."

PLG_SYSTEM_EASYOIDC_FIELD_CLAIM_EMAIL="Email claim"
PLG_SYSTEM_EASYOIDC_FIELD_CLAIM_EMAIL_DESC="The OIDC claim that holds the user's email address. Standard is email."

PLG_SYSTEM_EASYOIDC_FIELD_CLAIM_NAME="Display-name claim"
PLG_SYSTEM_EASYOIDC_FIELD_CLAIM_NAME_DESC="The OIDC claim that holds the user's full display name. Standard is name. Used only when auto-creating users."

PLG_SYSTEM_EASYOIDC_FIELD_POST_LOGIN_URL="Default post-login URL"
PLG_SYSTEM_EASYOIDC_FIELD_POST_LOGIN_URL_DESC="Where the user lands after successful login, when no ?return= parameter is supplied. Default: /"

PLG_SYSTEM_EASYOIDC_FIELD_POST_LOGOUT_URL="Post-logout URL"
PLG_SYSTEM_EASYOIDC_FIELD_POST_LOGOUT_URL_DESC="Where the IdP redirects the user after end_session. This URL must be registered as a valid post-logout redirect URI on the IdP client."

PLG_SYSTEM_EASYOIDC_FIELD_DEBUG_LOG="Debug log"
PLG_SYSTEM_EASYOIDC_FIELD_DEBUG_LOG_DESC="When enabled, write OIDC errors and trace info to administrator/logs/easyoidc.log. Disable in production unless troubleshooting."

PLG_SYSTEM_EASYOIDC_ERR_SIGN_IN_FAILED="Sign-in failed. Please try again or contact an administrator."
PLG_SYSTEM_EASYOIDC_ERR_USER_NOT_PROVISIONED="No matching Joomla account was found. Please contact an administrator."
PLG_SYSTEM_EASYOIDC_ERR_USER_BLOCKED="This account is blocked. Please contact an administrator."
PLG_SYSTEM_EASYOIDC_ERR_UNKNOWN_TASK="Unknown OIDC task."
