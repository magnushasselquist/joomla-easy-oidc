PLG_SYSTEM_HQOIDC="System - HQ OIDC"
PLG_SYSTEM_HQOIDC_XML_DESCRIPTION="Minimal OIDC-SSO för Joomla. Autentiserar användare mot en extern identitetsleverantör (testad mot Keycloak) via OpenID Connect authorization-code-flödet med PKCE."

PLG_SYSTEM_HQOIDC_FIELDSET_BASIC="Grundinställningar"
PLG_SYSTEM_HQOIDC_FIELDSET_ADVANCED="Avancerat"

PLG_SYSTEM_HQOIDC_FIELD_ISSUER_URL="Issuer-URL"
PLG_SYSTEM_HQOIDC_FIELD_ISSUER_URL_DESC="OIDC-leverantörens issuer-URL. För Keycloak är detta https://<värd>/realms/<realm>. Pluginen hämtar övriga endpoints från .well-known/openid-configuration."

PLG_SYSTEM_HQOIDC_FIELD_CLIENT_ID="Klient-ID"
PLG_SYSTEM_HQOIDC_FIELD_CLIENT_ID_DESC="OAuth/OIDC-klientidentifieraren som är konfigurerad hos identitetsleverantören."

PLG_SYSTEM_HQOIDC_FIELD_CLIENT_SECRET="Klienthemlighet"
PLG_SYSTEM_HQOIDC_FIELD_CLIENT_SECRET_DESC="Klienthemlighet för konfidentiella klienter. Lämna tom för publika klienter (endast PKCE)."

PLG_SYSTEM_HQOIDC_FIELD_SCOPES="Scopes"
PLG_SYSTEM_HQOIDC_FIELD_SCOPES_DESC="Mellanslagsavgränsade OIDC-scopes. Standard är 'openid profile email'."

PLG_SYSTEM_HQOIDC_FIELD_MATCH_FIELD="Matcha Joomla-användare på"
PLG_SYSTEM_HQOIDC_FIELD_MATCH_FIELD_DESC="Vilket fält som identifierar Joomla-användaren: användarnamn (matchas mot claim preferred_username) eller e-post (matchas mot claim email)."
PLG_SYSTEM_HQOIDC_OPT_MATCH_USERNAME="Användarnamn (preferred_username)"
PLG_SYSTEM_HQOIDC_OPT_MATCH_EMAIL="E-post"

PLG_SYSTEM_HQOIDC_FIELD_PROVISIONING="Provisionering"
PLG_SYSTEM_HQOIDC_FIELD_PROVISIONING_DESC="Vad som händer när en autentiserad IdP-användare saknar matchande Joomla-konto: avvisa (endast matchning) eller skapa nytt Joomla-konto (autoskapa)."
PLG_SYSTEM_HQOIDC_OPT_PROV_MATCH_ONLY="Endast matchning (avvisa okända användare)"
PLG_SYSTEM_HQOIDC_OPT_PROV_AUTO_CREATE="Autoskapa nya användare"

PLG_SYSTEM_HQOIDC_FIELD_DEFAULT_GROUP="Standardanvändargrupp"
PLG_SYSTEM_HQOIDC_FIELD_DEFAULT_GROUP_DESC="Joomla-användargrupp som tilldelas autoskapade användare."

PLG_SYSTEM_HQOIDC_FIELD_SINGLE_LOGOUT="Single Logout (RP-initierad)"
PLG_SYSTEM_HQOIDC_FIELD_SINGLE_LOGOUT_DESC="När aktiverat loggar utloggning från Joomla även ut användaren från IdP:n via end_session-endpoint."

PLG_SYSTEM_HQOIDC_FIELD_CLAIM_USERNAME="Användarnamn-claim"
PLG_SYSTEM_HQOIDC_FIELD_CLAIM_USERNAME_DESC="Det OIDC-claim som innehåller användarens inloggningsnamn. Standard är preferred_username."

PLG_SYSTEM_HQOIDC_FIELD_CLAIM_EMAIL="E-post-claim"
PLG_SYSTEM_HQOIDC_FIELD_CLAIM_EMAIL_DESC="Det OIDC-claim som innehåller användarens e-postadress. Standard är email."

PLG_SYSTEM_HQOIDC_FIELD_CLAIM_NAME="Visningsnamn-claim"
PLG_SYSTEM_HQOIDC_FIELD_CLAIM_NAME_DESC="Det OIDC-claim som innehåller användarens fullständiga namn. Standard är name. Används bara vid autoskapande av användare."

PLG_SYSTEM_HQOIDC_FIELD_POST_LOGIN_URL="Standard-URL efter inloggning"
PLG_SYSTEM_HQOIDC_FIELD_POST_LOGIN_URL_DESC="Vart användaren skickas efter lyckad inloggning, om ingen ?return= angetts. Standard: /"

PLG_SYSTEM_HQOIDC_FIELD_POST_LOGOUT_URL="URL efter utloggning"
PLG_SYSTEM_HQOIDC_FIELD_POST_LOGOUT_URL_DESC="Vart IdP:n skickar användaren efter end_session. Denna URL måste vara registrerad som giltig post_logout_redirect_uri på IdP-klienten."

PLG_SYSTEM_HQOIDC_FIELD_DEBUG_LOG="Felsökningslogg"
PLG_SYSTEM_HQOIDC_FIELD_DEBUG_LOG_DESC="När aktiverat skrivs OIDC-fel och spårinformation till administrator/logs/hqoidc.log. Stäng av i produktion när felsökning inte pågår."

PLG_SYSTEM_HQOIDC_ERR_SIGN_IN_FAILED="Inloggning misslyckades. Försök igen eller kontakta en administratör."
PLG_SYSTEM_HQOIDC_ERR_USER_NOT_PROVISIONED="Inget matchande Joomla-konto hittades. Kontakta en administratör."
PLG_SYSTEM_HQOIDC_ERR_USER_BLOCKED="Detta konto är blockerat. Kontakta en administratör."
PLG_SYSTEM_HQOIDC_ERR_UNKNOWN_TASK="Okänt OIDC-anrop."
